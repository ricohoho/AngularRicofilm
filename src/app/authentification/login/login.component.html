<div class="login-container">
  <div class="login-glass-card">
    
    <div class="login-header">
      <h2 class="login-title">Content de vous revoir !</h2>
      <p class="login-subtitle">Connectez-vous pour continuer</p>
    </div>

    <form *ngIf="!isLoggedIn" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate class="login-form-inner">
      
      <div class="field login-field">
        <span class="p-input-icon-left w-full">
          <i class="pi pi-user"></i>
          <input type="text" pInputText placeholder="Code Utilisateur" class="w-full custom-input" name="username" [(ngModel)]="form.username" 
            required #username="ngModel" [ngClass]="{ 'is-invalid': f.submitted && username.errors }" 
            autocomplete="username" />
        </span>
        <div *ngIf="f.submitted && username.errors" class="error-msg">
          <small class="p-error" *ngIf="username.errors['required']">Code utilisateur obligatoire</small>
        </div>
      </div>

      <div class="field login-field">
        <span class="p-input-icon-left w-full">
          <i class="pi pi-lock"></i>
          <input type="password" pInputText placeholder="Mot de passe" class="w-full custom-input" name="password" [(ngModel)]="form.password" 
            required minlength="6" #password="ngModel" [ngClass]="{ 'is-invalid': f.submitted && password.errors }"
            autocomplete="current-password" />
        </span>
        <div *ngIf="f.submitted && password.errors" class="error-msg">
          <small class="p-error" *ngIf="password.errors['required']">Le mot de passe est obligatoire</small>
          <small class="p-error" *ngIf="password.errors['minlength']">Au moins 6 caractères</small>
        </div>
      </div>
      
      <div *ngIf="f.submitted && isLoginFailed" class="error-msg text-center mb-3">
        <small class="p-error">Connexion échouée : {{ errorMessage }}</small>
      </div>

      <div class="login-actions">
        <button pButton type="submit" class="w-full btn-primary" label="Connexion"></button>
      </div>
      
      <div class="login-footer">
        <span class="text-gray-400">Pas encore de compte ?</span>
        <button pButton type="button" class="p-button-text p-button-plain register-btn" label="S'inscrire" (click)="goRegister()"></button>
      </div>
    </form>

    <div class="login-success text-center" *ngIf="isLoggedIn">
      <i class="pi pi-check-circle success-icon"></i>
      <h3>Connexion réussie</h3>
      <p>Bienvenue {{form.username}}</p>
    </div>

  </div>
</div>
